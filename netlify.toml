[build]
  command = "rm -rf .next && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
  # Note: If build fails with auth errors, add NETLIFY_AUTH_TOKEN to environment variables
  # or retry the deploy (may be transient network issue)

# Security headers (X-Frame-Options, CSP, etc.) are intentionally NOT defined
# here. They live in `next.config.ts` (`headers()`) which is the single source
# of truth and is propagated by `@netlify/plugin-nextjs`. Defining them here
# would produce duplicate headers in the production response.
#
# The previous `netlify/edge-functions/security-headers` registration was
# removed for the same reason.

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Cache headers. These are unrelated to security headers and stay here because
# Next.js doesn't emit per-extension cache rules for the static asset paths
# served directly by the Netlify CDN.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
